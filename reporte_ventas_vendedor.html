<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Venta Diaria</title>
</head>
<body style="margin:0; padding:0; background-color:#f0f2f5; font-family:'Segoe UI', Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0f2f5; padding:32px 0;">
    <tr>
      <td align="center">

        <table width="640" cellpadding="0" cellspacing="0" border="0" style="max-width:640px; width:100%; background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background-color:#0f172a; padding:28px 36px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <p style="margin:0 0 4px 0; font-size:11px; font-weight:600; letter-spacing:2px; color:#94a3b8; text-transform:uppercase;">Reporte Diario de Venta</p>
                    <h1 style="margin:0; font-size:22px; font-weight:700; color:#f8fafc; letter-spacing:-0.3px;">Vendedor:</h1>
                  </td>
                  <td align="right" style="vertical-align:bottom;">
                    <p style="margin:0; font-size:12px; color:#64748b;">Acumulado hasta: <strong style="color:#94a3b8;">Abril 2026</strong></p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- KPI Banner -->
          <tr>
            <td style="background-color:#1e293b; padding:0 36px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td width="33%" style="padding:22px 0; text-align:center; border-right:1px solid #334155;">
                    <p style="margin:0 0 4px 0; font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:1px;">Total General</p>
                    <p style="margin:0; font-size:26px; font-weight:700; color:#f8fafc;">$234.000</p>
                  </td>
                  <td width="33%" style="padding:22px 0; text-align:center; border-right:1px solid #334155;">
                    <p style="margin:0 0 4px 0; font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:1px;">Meta Equipo</p>
                    <p style="margin:0; font-size:26px; font-weight:700; color:#f8fafc;">$300.000</p>
                  </td>
                  <td width="33%" style="padding:22px 0; text-align:center;">
                    <p style="margin:0 0 4px 0; font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:1px;">Avance</p>
                    <p style="margin:0; font-size:26px; font-weight:700; color:#f59e0b;">78,0%</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Nota -->
          <tr>
            <td style="padding:24px 36px 28px 36px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f8fafc; border-radius:6px; border-left:3px solid #38bdf8;">
                <tr>
                  <td style="padding:12px 16px;">
                    <p style="margin:0; font-size:12px; color:#475569; line-height:1.6;">
                      <strong style="color:#0f172a;">Nota:</strong> Cifras en CLP sin IVA.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc; border-top:1px solid #e2e8f0; padding:16px 36px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="font-size:11px; color:#94a3b8;">Generado automáticamente · No responder este correo</td>
                  <td align="right" style="font-size:11px; color:#94a3b8;">Reporte #2026-04</td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
